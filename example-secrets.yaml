# =============================================================================
# SOPS secrets file - example-secrets.yaml
#
# This file is an UNENCRYPTED example/template. The real secrets.yaml must be
# encrypted with SOPS before committing. Never commit plaintext secrets.
#
# Encrypt with:
#   sops --encrypt secrets.yaml > secrets.yaml.enc
#   # or in-place:
#   sops -e -i secrets.yaml
#
# Referenced by:
#   modules/system/sops.nix
#   modules/user/sops.nix
# =============================================================================

# -----------------------------------------------------------------------------
# Users
# -----------------------------------------------------------------------------
user:
  <username>:
    password: "changeme-strong-password-123!"   # hashed or plaintext depending on sops-nix usage
    fullname: "Firstname Lastname"
    email: "user@example.com"

# -----------------------------------------------------------------------------
# SSH Keys
# Paths map to the sops secret keys referenced in modules/system/sops.nix
# and modules/user/sops.nix.
#
# Generate user's NixOS key:
#   ssh-keygen -t ed25519 -C "user@nixos" -f ~/.ssh/id_nixos -N ""
#
# Generate btrbk backup key (no passphrase - used unattended):
#   ssh-keygen -t ed25519 -C "btrbk@nixos" -f /var/lib/btrbk/.ssh/id_btrbk_key -N ""
# -----------------------------------------------------------------------------
keys:
  ssh:
    <username>:
      id_nixos:
        # Private key deployed to /home/$USER/.ssh/id_nixos by sops-nix
        private_key: |
          -----BEGIN OPENSSH PRIVATE KEY-----
          b3BlbnNzaC1rZXktdjEAAAABbm9uZQAAAARub25lAAAAGAAAABBleGFtcGxlLW5p
          eG9zLWtleQAAAAEAAAAzAAAAC3NzaC1lZDI1NTE5AAAAIExampleUserPrivateKey
          Placeholder0000000000000000000000000000000000AAABAQC0ExampleBase64
          EncodedEd25519PrivateKeyForUserGoesHereReplace WithRealKeyGenerated
          BySshKeygenCommandAbove0000000000000000000000AAAAAAAAAAAAprivatekey
          -----END OPENSSH PRIVATE KEY-----
        # Corresponding public key (add to ~/.ssh/authorized_keys on remote hosts)
        public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIExampleUserPublicKeyReplaceMeWithReal user@nixos"

    btrbk:
      id_btrbk_key:
        # Private key deployed to /var/lib/btrbk/.ssh/id_btrbk_key, owned by btrbk
        # This key is used for unattended SSH backup via btrbk → btrbk-ubuntu host
        private_key: |
          -----BEGIN OPENSSH PRIVATE KEY-----
          b3BlbnNzaC1rZXktdjEAAAABbm9uZQAAAARub25lAAAAGAAAABBleGFtcGxlLWJ0
          cmJrLWtleQAAAAEAAAAzAAAAC3NzaC1lZDI1NTE5AAAAIExampleBtrbkPrivateKey
          Placeholder0000000000000000000000000000000000AAABAQC0ExampleBase64
          EncodedEd25519PrivateKeyForBtrbkGoesHereReplace WithRealKeyGenerated
          BySshKeygenCommandAbove0000000000000000000000AAAAAAAAAAAAprivatekey
          -----END OPENSSH PRIVATE KEY-----
        # Add this public key to the btrbk user's authorized_keys on the backup target host
        public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIExampleBtrbkPublicKeyReplaceMeWithReal btrbk@nixos"

# -----------------------------------------------------------------------------
# SSH Host Access
# Referenced in modules/system/ssh.nix for SSH client host configuration.
# Hosts must be reachable via SSH (LAN or VPN).
# -----------------------------------------------------------------------------
ssh:
  ubuntu:                  # corresponds to Host "userver" and "btrbk-ubuntu" in ssh_config
    ip-address: "192.168.1.2"
    port: "2020"           # non-standard SSH port for security

  windows:                 # corresponds to Host "windows11" in ssh_config
    ip-address: "192.168.1.3"
    port: "2020"             # standard SSH port (OpenSSH on Windows)
    user: "WindowsUser"    # Windows local account username

  # Optional: additional hosts reachable over SSH
  raspi:
    ip-address: "192.168.1.100"
    port: "2020"
    user: "RaspiUser"

  vps:
    ip-address: "203.0.113.42"   # example public IP (TEST-NET-3, RFC 5737)
    port: "2020"
    user: "vpsUser"

# -----------------------------------------------------------------------------
# Network
# Referenced in modules/system/sops.nix
# -----------------------------------------------------------------------------
network:
  ip-address: "192.168.1.10"      # this machine's static LAN IP
  default-gateway: "192.168.1.1"  # router/gateway IP
  dns1: "9.9.9.9"                 # Quad9 primary DNS
  dns2: "149.112.112.112"         # Quad9 secondary DNS
